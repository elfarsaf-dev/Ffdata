<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FF Cyberpunk Profile</title>

<style>

:root{
--bg:#060b1a;
--text:#e8f0ff;
--muted:#98a4c5;
--glass:rgba(13,20,42,.55);
--border:rgba(255,255,255,.18);
--primary:#4cc9f0;
--accent:#b5179e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:"Orbitron","Rajdhani",Arial,sans-serif;
color:var(--text);
background:radial-gradient(circle at 15% 20%,#102046 0%,#060b1a 50%),var(--bg);
overflow-x:hidden;
min-height:100vh;
}

#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
opacity:.45;
}

header{
text-align:center;
padding:30px 20px 8px;
font-size:clamp(28px,4vw,44px);
font-weight:800;
letter-spacing:3px;
text-transform:uppercase;
background:linear-gradient(90deg,#6be8ff,#f744d0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px rgba(76,201,240,.35);
}

.subtitle{
text-align:center;
margin:0;
color:var(--muted);
font-size:14px;
letter-spacing:.5px;
}

.search{
text-align:center;
margin:26px auto;
display:flex;
justify-content:center;
align-items:center;
gap:12px;
padding:0 18px;
flex-wrap:wrap;
}

input{
padding:14px 16px;
border-radius:12px;
border:1px solid var(--border);
min-width:min(360px,92vw);
background:rgba(255,255,255,.08);
color:var(--text);
backdrop-filter:blur(12px);
outline:none;
box-shadow:0 10px 30px rgba(0,0,0,.3);
transition:.25s;
}

input:focus{
border-color:rgba(76,201,240,.7);
box-shadow:0 0 0 3px rgba(76,201,240,.18),0 10px 30px rgba(0,0,0,.3);
}

button{
padding:14px 24px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#4cc9f0,#b5179e);
color:white;
cursor:pointer;
font-weight:700;
letter-spacing:.5px;
box-shadow:0 10px 28px rgba(181,23,158,.32);
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 14px 34px rgba(181,23,158,.45);
}

.card{
background:var(--glass);
backdrop-filter:blur(16px);
border-radius:18px;
padding:24px;
margin:16px auto;
max-width:960px;
border:1px solid var(--border);
position:relative;
transition:.3s;
box-shadow:0 24px 40px rgba(0,0,0,.35);
overflow:hidden;
}

.card:before{
content:"";
position:absolute;
top:-2px;
left:-2px;
right:-2px;
bottom:-2px;
background:linear-gradient(135deg,rgba(76,201,240,.55),rgba(181,23,158,.55),rgba(76,201,240,.3));
z-index:-2;
filter:blur(16px);
opacity:.55;
border-radius:18px;
}

.card:after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(120deg,rgba(255,255,255,.12),transparent 40%);
z-index:-1;
}

.profile{text-align:center}

.banner{
width:100%;
border-radius:14px;
opacity:.92;
height:230px;
object-fit:cover;
box-shadow:0 14px 34px rgba(0,0,0,.35);
}

.avatar{
width:116px;
height:116px;
object-fit:cover;
border-radius:24px;
margin-top:-58px;
border:3px solid rgba(76,201,240,.85);
box-shadow:0 12px 30px rgba(76,201,240,.45);
}

.stats{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:14px;
}

.stat{
padding:10px 14px;
background:rgba(6,11,26,.6);
border:1px solid rgba(255,255,255,.12);
border-radius:10px;
font-size:13px;
letter-spacing:.4px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(72px,1fr));
gap:12px;
justify-content:center;
margin-top:12px;
}

.grid img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:12px;
transition:.3s;
cursor:pointer;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 10px 22px rgba(0,0,0,.3);
}

.grid img:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 12px 24px rgba(76,201,240,.4);
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(1,3,10,.82);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:50;
}

.popup img{
max-width:min(440px,90vw);
border-radius:18px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 25px 45px rgba(0,0,0,.45);
}

.loading{
text-align:center;
margin-top:50px;
}

.spinner{
width:40px;
height:40px;
border:4px solid rgba(255,255,255,.14);
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

h3{
margin:0 0 10px;
font-size:18px;
letter-spacing:.6px;
color:#d8e7ff;
}

p{color:#ced8ef}

#result{padding:0 16px 30px}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

@media (max-width:700px){
.card{padding:18px}
.banner{height:170px}
.avatar{width:98px;height:98px;margin-top:-50px}
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<header>FREE FIRE CYBER PROFILE</header>
<p class="subtitle">Modern Player Dashboard • Glassmorphism Edition</p>

<div class="search">

<input id="uid" placeholder="Enter UID">
<button onclick="check()">Search</button>

</div>

<div id="result"></div>

<div class="popup" id="popup" onclick="closePopup()">

<img id="popupImg">

</div>

<script>

const playerAPI="https://ff.cocspedsafliz.workers.dev/uid?uid="
const assetAPI="https://ff.cocspedsafliz.workers.dev/lookup?id="

async function asset(id){

if(!id)return ""

try{

let r=await fetch(assetAPI+id)
let j=await r.json()
return j.image

}catch{return ""}

}

async function load(list){

return Promise.all(list.map(asset))

}

function inspect(src){

document.getElementById("popupImg").src=src
document.getElementById("popup").style.display="flex"

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

async function check(){

let uid=document.getElementById("uid").value

document.getElementById("result").innerHTML=
'<div class="loading"><div class="spinner"></div></div>'

try{

let res=await fetch(playerAPI+uid)
let data=await res.json()
let r=data.result

let avatar=await asset(r.equipped_avatar_id)
let banner=await asset(r.equipped_banner_id)
let pet=await asset(r.pet_id)

let weaponList=JSON.parse(r.equipped_weapon||"[]")
let outfitList=JSON.parse(r.equipped_outfit||"[]")

let weapons=await load(weaponList)
let outfits=await load(outfitList)

let weaponHTML=weapons.map(i=>`<img src="${i}" onclick="inspect('${i}')">`).join("")
let outfitHTML=outfits.map(i=>`<img src="${i}" onclick="inspect('${i}')">`).join("")

document.getElementById("result").innerHTML=`

<div class="card profile">

<img class="banner" src="${banner}">

<img class="avatar" src="${avatar}">

<h2>${r.name}</h2>

<div class="stats">

<div class="stat">UID ${r.uid}</div>
<div class="stat">Level ${r.level}</div>
<div class="stat">Likes ${r.likes}</div>
<div class="stat">BR ${r.br_rank_point}</div>
<div class="stat">CS ${r.cs_rank_point}</div>

</div>

</div>

<div class="card">

<h3>Pet</h3>

<img src="${pet}" width="90">

</div>

<div class="card">

<h3>Weapon Showcase</h3>

<div class="grid">

${weaponHTML}

</div>

</div>

<div class="card">

<h3>Outfit</h3>

<div class="grid">

${outfitHTML}

</div>

</div>

<div class="card">

<h3>Guild</h3>

<p>${r.guild_name||"-"}</p>
<p>Leader: ${r.guild_leader_name||"-"}</p>

</div>

`

}catch{

document.getElementById("result").innerHTML="Error loading UID"

}

}

/* PARTICLES */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let p=[]

for(let i=0;i<80;i++){

p.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="rgba(0,255,255,.5)"

p.forEach(i=>{
ctx.beginPath()
ctx.arc(i.x,i.y,i.r,0,Math.PI*2)
ctx.fill()

i.y+=.3
if(i.y>canvas.height)i.y=0

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
