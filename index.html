<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FF Profile Lookup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0d0d0f;
--surface:#18181c;
--surface2:#222228;
--border:#2e2e38;
--text:#f0f0f5;
--muted:#7c7c95;
--gold:#f5a623;
--gold2:#ffcf74;
--green:#22c55e;
--red:#ef4444;
}

body{
font-family:"Inter",sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
overflow-x:hidden;
}

/* ─── BG GRID ─── */
body::before{
content:"";
position:fixed;
inset:0;
background-image:
  linear-gradient(rgba(245,166,35,.04) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,166,35,.04) 1px,transparent 1px);
background-size:40px 40px;
z-index:0;
pointer-events:none;
}

/* ─── TOP NAV ─── */
nav{
position:sticky;
top:0;
z-index:100;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 28px;
height:60px;
background:rgba(13,13,15,.85);
backdrop-filter:blur(18px);
border-bottom:1px solid var(--border);
}

.nav-logo{
font-family:"Space Grotesk",sans-serif;
font-size:18px;
font-weight:700;
color:var(--gold);
letter-spacing:1px;
}

.nav-badge{
font-size:11px;
font-weight:600;
letter-spacing:.8px;
color:var(--muted);
background:var(--surface2);
border:1px solid var(--border);
padding:4px 10px;
border-radius:20px;
}

/* ─── HERO ─── */
.hero{
position:relative;
z-index:1;
text-align:center;
padding:70px 20px 50px;
}

.hero h1{
font-family:"Space Grotesk",sans-serif;
font-size:clamp(32px,5vw,58px);
font-weight:700;
line-height:1.1;
color:#fff;
}

.hero h1 span{
background:linear-gradient(90deg,var(--gold),var(--gold2));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p{
margin-top:14px;
color:var(--muted);
font-size:15px;
}

/* ─── SEARCH BOX ─── */
.search-wrap{
position:relative;
z-index:1;
display:flex;
justify-content:center;
padding:0 20px 60px;
}

.search-box{
display:flex;
align-items:center;
gap:0;
background:var(--surface);
border:1px solid var(--border);
border-radius:14px;
overflow:hidden;
width:min(520px,100%);
box-shadow:0 0 0 1px transparent;
transition:.25s;
}

.search-box:focus-within{
border-color:var(--gold);
box-shadow:0 0 0 3px rgba(245,166,35,.18);
}

.search-box input{
flex:1;
background:transparent;
border:none;
outline:none;
padding:16px 20px;
font-size:15px;
font-family:"Inter",sans-serif;
color:var(--text);
}

.search-box input::placeholder{color:var(--muted)}

.search-box button{
background:linear-gradient(135deg,var(--gold),#e6920f);
border:none;
padding:14px 26px;
font-family:"Space Grotesk",sans-serif;
font-size:14px;
font-weight:700;
color:#0d0d0f;
cursor:pointer;
letter-spacing:.5px;
transition:.2s;
white-space:nowrap;
}

.search-box button:hover{
filter:brightness(1.1);
}

/* ─── RESULT AREA ─── */
#result{
position:relative;
z-index:1;
max-width:1000px;
margin:0 auto;
padding:0 20px 60px;
}

/* ─── LOADING ─── */
.loading-wrap{
display:flex;
flex-direction:column;
align-items:center;
gap:16px;
padding:60px 0;
color:var(--muted);
font-size:14px;
}

.ring{
width:44px;
height:44px;
border:3px solid var(--border);
border-top-color:var(--gold);
border-radius:50%;
animation:spin .8s linear infinite;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* ─── PROFILE HEADER ─── */
.profile-header{
position:relative;
border-radius:18px;
overflow:hidden;
margin-bottom:20px;
border:1px solid var(--border);
background:var(--surface);
}

.profile-banner{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.profile-banner-fallback{
width:100%;
height:220px;
background:linear-gradient(135deg,#1a1a22,#2a2430);
}

.profile-info-row{
display:flex;
align-items:flex-end;
gap:20px;
padding:0 28px 28px;
margin-top:-50px;
position:relative;
}

.avatar-wrap{
position:relative;
flex-shrink:0;
}

.profile-avatar{
width:96px;
height:96px;
border-radius:16px;
object-fit:cover;
border:3px solid var(--gold);
box-shadow:0 0 28px rgba(245,166,35,.35);
background:var(--surface2);
}

.online-dot{
position:absolute;
bottom:4px;
right:4px;
width:14px;
height:14px;
background:var(--green);
border-radius:50%;
border:2px solid var(--surface);
}

.profile-meta{
flex:1;
padding-bottom:4px;
}

.profile-name{
font-family:"Space Grotesk",sans-serif;
font-size:26px;
font-weight:700;
color:#fff;
line-height:1.2;
}

.profile-uid{
font-size:13px;
color:var(--muted);
margin-top:4px;
}

.profile-stats{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:14px;
}

.pstat{
display:flex;
flex-direction:column;
gap:2px;
background:var(--surface2);
border:1px solid var(--border);
border-radius:10px;
padding:10px 16px;
min-width:80px;
}

.pstat-label{
font-size:10px;
letter-spacing:.6px;
text-transform:uppercase;
color:var(--muted);
}

.pstat-val{
font-family:"Space Grotesk",sans-serif;
font-size:18px;
font-weight:700;
color:var(--gold);
}

/* ─── SECTION CARDS ─── */
.section-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:24px;
margin-bottom:20px;
}

.section-title{
font-family:"Space Grotesk",sans-serif;
font-size:13px;
font-weight:700;
letter-spacing:1px;
text-transform:uppercase;
color:var(--muted);
margin-bottom:20px;
display:flex;
align-items:center;
gap:10px;
}

.section-title::before{
content:"";
display:inline-block;
width:3px;
height:14px;
background:var(--gold);
border-radius:2px;
}

/* ─── GUILD CARD ─── */
.guild-row{
display:flex;
align-items:center;
gap:18px;
}

.guild-icon{
width:52px;
height:52px;
border-radius:12px;
background:linear-gradient(135deg,var(--surface2),#2e2e3c);
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
flex-shrink:0;
}

.guild-info p{
font-family:"Space Grotesk",sans-serif;
font-size:18px;
font-weight:700;
color:#fff;
}

.guild-info span{
font-size:13px;
color:var(--muted);
}

/* ─── PET CARD ─── */
.pet-wrap{
display:flex;
align-items:center;
gap:20px;
}

.pet-img{
width:88px;
height:88px;
border-radius:14px;
object-fit:cover;
background:var(--surface2);
border:1px solid var(--border);
}

/* ─── WEAPON GRID ─── */
.weapon-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
gap:10px;
}

.weapon-item{
background:var(--surface2);
border:1px solid var(--border);
border-radius:12px;
overflow:hidden;
aspect-ratio:1;
cursor:pointer;
transition:.2s;
position:relative;
}

.weapon-item:hover{
border-color:var(--gold);
transform:translateY(-3px);
box-shadow:0 10px 24px rgba(0,0,0,.4);
}

.weapon-item img{
width:100%;
height:100%;
object-fit:cover;
}

/* ─── GENERATE CARD ─── */
.generate-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:24px;
margin-bottom:20px;
}

/* ─── POPUP ─── */
.popup{
position:fixed;
inset:0;
background:rgba(5,5,7,.88);
display:none;
align-items:center;
justify-content:center;
z-index:200;
padding:20px;
backdrop-filter:blur(8px);
}

.popup-inner{
position:relative;
background:var(--surface);
border:1px solid var(--border);
border-radius:20px;
padding:16px;
max-width:min(420px,92vw);
}

.popup-inner img{
width:100%;
border-radius:12px;
display:block;
}

.popup-close{
position:absolute;
top:-14px;
right:-14px;
width:32px;
height:32px;
background:var(--surface2);
border:1px solid var(--border);
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:18px;
color:var(--text);
line-height:1;
}

.popup-close:hover{color:var(--gold)}

/* ─── AI GENERATE ─── */
.gen-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
width:100%;
margin-top:22px;
padding:15px 24px;
background:linear-gradient(135deg,#1a1a22,#28242e);
border:1px solid var(--gold);
border-radius:12px;
color:var(--gold);
font-family:"Space Grotesk",sans-serif;
font-size:14px;
font-weight:700;
letter-spacing:.6px;
cursor:pointer;
transition:.25s;
}

.gen-btn:hover{
background:linear-gradient(135deg,var(--gold),#e6920f);
color:#0d0d0f;
box-shadow:0 0 28px rgba(245,166,35,.35);
transform:translateY(-2px);
}

.gen-btn:disabled{
opacity:.5;
cursor:not-allowed;
transform:none;
}

.gen-btn .spin{
display:inline-block;
width:16px;
height:16px;
border:2px solid currentColor;
border-top-color:transparent;
border-radius:50%;
animation:spin .7s linear infinite;
}

.ai-result-card{
background:var(--surface);
border:1px solid var(--border);
border-radius:18px;
padding:24px;
margin-bottom:20px;
text-align:center;
}

.ai-result-card .ai-img{
width:100%;
max-width:400px;
border-radius:14px;
border:1px solid var(--border);
box-shadow:0 20px 50px rgba(0,0,0,.5);
cursor:pointer;
transition:.2s;
}

.ai-result-card .ai-img:hover{
transform:scale(1.02);
box-shadow:0 24px 60px rgba(245,166,35,.2);
}

.ai-err{
color:var(--red);
font-size:13px;
margin-top:12px;
}

/* ─── UPLOAD AREA ─── */
.upload-area{
margin-top:16px;
border:1.5px dashed var(--border);
border-radius:12px;
padding:14px 16px;
cursor:pointer;
transition:.2s;
text-align:center;
background:var(--bg);
}

.upload-area:hover{
border-color:var(--gold);
background:rgba(245,166,35,.05);
}

.upload-area input[type=file]{
display:none;
}

.upload-label{
display:flex;
flex-direction:column;
align-items:center;
gap:6px;
cursor:pointer;
}

.upload-icon{
font-size:22px;
}

.upload-label span{
font-size:12px;
color:var(--muted);
line-height:1.4;
}

.upload-label strong{
font-size:13px;
color:var(--text);
}

.upload-preview{
width:100%;
border-radius:8px;
margin-top:10px;
max-height:100px;
object-fit:cover;
border:1px solid var(--border);
display:none;
}

/* ─── ERROR ─── */
.error-box{
text-align:center;
padding:48px 20px;
color:var(--muted);
}

.error-box .err-icon{font-size:42px;margin-bottom:16px}
.error-box p{font-size:14px}

/* ─── RESPONSIVE ─── */
@media(max-width:640px){
.outfit-container{flex-direction:column;align-items:center}
.outfit-legend{padding-left:0;padding-top:40px;width:100%;max-width:320px}
.profile-info-row{flex-direction:column;align-items:flex-start;margin-top:-30px}
.profile-banner{height:160px}
.profile-avatar{width:80px;height:80px}
.profile-name{font-size:21px}
}

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">FF PROFILE</div>
  <div class="nav-badge">PLAYER LOOKUP</div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Cari Profil<br><span>Free Fire</span></h1>
  <p>Masukkan UID untuk melihat stats, outfit, senjata, dan guild kamu</p>
</section>

<!-- SEARCH -->
<div class="search-wrap">
  <div class="search-box">
    <input id="uid" type="number" placeholder="Masukkan UID pemain..." onkeydown="if(event.key==='Enter')check()">
    <button onclick="check()">Search →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result"></div>

<!-- POPUP -->
<div class="popup" id="popup" onclick="closePopup()">
  <div class="popup-inner" onclick="event.stopPropagation()">
    <div class="popup-close" onclick="closePopup()">×</div>
    <img id="popupImg">
  </div>
</div>

<script>

const PLAYER = "https://ff.cocspedsafliz.workers.dev/uid?uid=";
const ASSET  = "https://ff.cocspedsafliz.workers.dev/lookup?id=";

let _allOutfits = [];   // semua URL outfit mentah dari API
let _allWeapons = [];   // semua URL senjata mentah dari API
let _playerName = "";

// ─── Load satu gambar ke Image element ───
function loadImg(src){
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload  = () => res(img);
    img.onerror = () => rej(new Error("Gagal load: " + src));
    img.src = src;
  });
}

// ─── Load File object jadi Image ───
function loadFile(file){
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload  = () => res(img);
      img.onerror = rej;
      img.src = e.target.result;
    };
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

// ─── Build canvas: profile (atas) + semua outfit + senjata (bawah) ───
async function buildOutfitCanvas(outfits, weapons, profileFile){
  const CELL    = 120;   // ukuran tiap item
  const PAD     = 6;
  const LABEL_H = 20;
  const COLS    = 6;     // 6 item per baris

  // Semua item: outfit dulu, lalu senjata
  const items = [
    ...outfits.map(u => ({url:u, label:"Outfit"})),
    ...weapons.map(u => ({url:u, label:"Weapon"})),
  ].filter(i => i.url);

  const rows   = Math.ceil(items.length / COLS) || 1;
  const GRID_W = COLS * CELL;
  const GRID_H = rows * (CELL + LABEL_H);

  // Profile: lebar penuh GRID_W, tinggi proporsional
  const PROF_H = profileFile ? Math.round(GRID_W * 0.56) : 0; // ~16:9

  const canvas = document.createElement("canvas");
  canvas.width  = GRID_W;
  canvas.height = PROF_H + GRID_H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#0d0d0f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ── Baris atas: foto profil ──
  if(profileFile){
    try{
      const profImg = await loadFile(profileFile);
      // cover fit
      const scale = Math.max(GRID_W / profImg.width, PROF_H / profImg.height);
      const dw = profImg.width  * scale;
      const dh = profImg.height * scale;
      const dx = (GRID_W - dw) / 2;
      const dy = (PROF_H - dh) / 2;
      ctx.save();
      ctx.rect(0, 0, GRID_W, PROF_H);
      ctx.clip();
      ctx.drawImage(profImg, dx, dy, dw, dh);
      ctx.restore();

      // strip label
      ctx.fillStyle = "rgba(0,0,0,.5)";
      ctx.fillRect(0, 0, GRID_W, 24);
      ctx.fillStyle = "#f5a623";
      ctx.font = "bold 11px Inter,sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("PROFILE SCREENSHOT", GRID_W / 2, 15);

      // separator
      ctx.strokeStyle = "#2e2e38";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, PROF_H);
      ctx.lineTo(GRID_W, PROF_H);
      ctx.stroke();
    }catch(e){ console.warn("Profile err", e); }
  }

  // ── Baris bawah: semua item grid ──
  for(let i = 0; i < items.length; i++){
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x   = col * CELL;
    const y   = PROF_H + row * (CELL + LABEL_H);

    // Cell
    ctx.fillStyle = "#18181c";
    ctx.fillRect(x, y, CELL, CELL + LABEL_H);
    ctx.strokeStyle = "#2e2e38";
    ctx.lineWidth = 1;
    ctx.strokeRect(x + .5, y + .5, CELL - 1, CELL + LABEL_H - 1);

    // Label
    ctx.fillStyle = items[i].label === "Weapon" ? "#60a5fa" : "#f5a623";
    ctx.font = "bold 9px Inter,sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(items[i].label + " " + (i + 1), x + CELL / 2, y + LABEL_H - 5);

    // Gambar
    try{
      const img = await loadImg(items[i].url);
      ctx.drawImage(img, x + PAD, y + LABEL_H, CELL - PAD * 2, CELL - PAD * 2);
    }catch(e){ console.warn("Skip item", i, e.message); }
  }

  return new Promise(res => canvas.toBlob(res, "image/png"));
}

// ─── Upload ke API dan tampilkan hasil ───
async function generateCharacter(){
  const btn     = document.getElementById("genBtn");
  const aiArea  = document.getElementById("ai-result");
  const fileIn  = document.getElementById("profileUpload");
  if(!btn || !aiArea) return;

  if(!_allOutfits.length && !_allWeapons.length){
    aiArea.innerHTML = `<div class="ai-result-card"><p class="ai-err">Tidak ada outfit yang terdeteksi. Cari UID dulu.</p></div>`;
    return;
  }

  const profileFile = fileIn && fileIn.files[0] ? fileIn.files[0] : null;
  const nickname    = _playerName || "PLAYER";

  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span> Generating...`;
  aiArea.innerHTML = `
    <div class="ai-result-card">
      <div class="loading-wrap" style="padding:30px 0">
        <div class="ring"></div>
        <span>Menyusun referensi gambar...</span>
      </div>
    </div>`;

  try{
    const blob = await buildOutfitCanvas(_allOutfits, _allWeapons, profileFile);

    const span = aiArea.querySelector("span");
    if(span) span.textContent = "Mengirim ke AI... (bisa 30-60 detik)";

    const profileNote = profileFile
      ? `The left half of the reference image is the player's in-game profile screenshot — use it clearly as the background of the poster, keep all text and icons readable.`
      : ``;

    const prompt = `Create a cinematic digital poster for a Free Fire game player named "${nickname}".

POSTER LAYOUT:
- BACKGROUND: ${profileFile
    ? "Use the profile screenshot (left side of reference image) clearly displayed behind everything — do NOT blur or cover it, all details like icon, name, stats, textures must remain fully readable."
    : "A dramatic dark background with glowing embers and cinematic lighting."}
- FOREGROUND: A stylized anime/game-art character (NOT photorealistic) sitting on a throne, one hand resting on the armrest, the other holding a weapon, looking down with disdain.
- CHARACTER OUTFIT: Strictly use all outfit pieces shown in the right-side grid of the reference image: exact hair style and color (fully attached to head, NOT bald), exact eye/face accessories, exact top/jacket colors and design unchanged, exact bottom/pants colors and design unchanged, exact shoes.
- TEXT OVERLAY: At the center of the poster, add bold glowing 3D text that reads "${nickname}" — use a golden-red spread effect with gold and silver star particles dripping from the letters.
- EFFECTS: Dramatic rain falling, floating light pearls/orbs, cinematic volumetric lighting, soft shadows highlighting the character and background. Character and background must NOT overlap confusingly — keep both clearly distinct.

STYLE: High-quality anime game-art / digital painting style (NOT realistic / NOT photographic). Think Free Fire official art. 4K resolution, vivid colors.`;

    const fd = new FormData();
    fd.append("image", blob, "reference.png");
    fd.append("param", prompt);

    const resp = await fetch("https://api.nexray.web.id/ai/gptimage", {
      method: "POST",
      body: fd
    });

    if(!resp.ok) throw new Error("API error: " + resp.status);

    const ct = resp.headers.get("content-type") || "";
    let resultSrc = "";

    if(ct.includes("image/")){
      const imgBlob = await resp.blob();
      resultSrc = URL.createObjectURL(imgBlob);
    } else {
      const json = await resp.json();
      resultSrc = json.url || json.image || json.result || "";
      if(!resultSrc) throw new Error("Respons API tidak berisi gambar.");
    }

    aiArea.innerHTML = `
      <div class="ai-result-card">
        <div class="section-title">AI Poster — ${nickname}</div>
        <img class="ai-img" src="${resultSrc}"
          onclick="inspect('${resultSrc}')"
          onerror="this.parentElement.innerHTML+='<p class=\\'ai-err\\'>Gambar gagal dimuat.</p>'">
        <p style="font-size:12px;color:var(--muted);margin-top:14px">
          Klik gambar untuk memperbesar • Poster AI karakter ${nickname}
        </p>
      </div>`;

  }catch(err){
    console.error(err);
    aiArea.innerHTML = `
      <div class="ai-result-card">
        <p class="ai-err">⚠ Gagal generate: ${err.message}</p>
        <p style="font-size:12px;color:var(--muted);margin-top:8px">Coba lagi beberapa saat.</p>
      </div>`;
  }finally{
    btn.disabled = false;
    btn.innerHTML = "✦ Generate AI Poster";
  }
}

async function fetchAsset(id){
  if(!id) return "";
  try{
    const r = await fetch(ASSET+id);
    const j = await r.json();
    return j.image || "";
  }catch{ return ""; }
}

async function loadMany(ids){ return Promise.all(ids.map(fetchAsset)); }

function inspect(src){
  document.getElementById("popupImg").src = src;
  document.getElementById("popup").style.display = "flex";
}

function closePopup(){
  document.getElementById("popup").style.display = "none";
}

function imgEl(src, cls="", onclick=""){
  if(!src) return `<div class="${cls}" style="opacity:.3"></div>`;
  return `<img src="${src}" class="${cls}" ${onclick?`onclick="${onclick}"`:""}
    onerror="this.style.opacity='.2';this.style.filter='grayscale(1)'">`;
}

async function check(){
  const uid = document.getElementById("uid").value.trim();
  if(!uid) return;

  const res = document.getElementById("result");
  res.innerHTML = `
    <div class="loading-wrap">
      <div class="ring"></div>
      <span>Mengambil data pemain...</span>
    </div>`;

  try{
    const r   = await fetch(PLAYER+uid);
    const d   = await r.json();
    const p   = d.result;

    // assets
    const [avatar, banner, pet] = await loadMany([
      p.equipped_avatar_id,
      p.equipped_banner_id,
      p.pet_id
    ]);

    // weapons & outfits
    const weaponIds  = JSON.parse(p.equipped_weapon  || "[]");
    const outfitIds  = JSON.parse(p.equipped_outfit  || "[]");
    const weapons    = await loadMany(weaponIds);
    const outfits    = await loadMany(outfitIds);

    // Simpan semua URL mentah ke global
    _allOutfits = outfits.filter(Boolean);
    _allWeapons = weapons.filter(Boolean);
    _playerName = p.name || "";

    // Grid semua outfit (raw)
    const outfitGridHTML = _allOutfits.map((url, i) =>
      `<div class="weapon-item" onclick="inspect('${url}')">
         <img src="${url}" onerror="this.style.opacity='.2'">
       </div>`
    ).join("") || `<p style="color:var(--muted);font-size:13px">Tidak ada outfit terdeteksi</p>`;

    // Grid senjata
    const weaponHTML = _allWeapons.map(w =>
      `<div class="weapon-item" onclick="inspect('${w}')">
         <img src="${w}" onerror="this.style.opacity='.2'">
       </div>`
    ).join("");

    res.innerHTML = `

      <!-- PROFILE HEADER -->
      <div class="profile-header">
        ${banner
          ? `<img class="profile-banner" src="${banner}" onerror="this.classList.add('profile-banner-fallback');this.remove()">`
          : `<div class="profile-banner-fallback"></div>`}
        <div class="profile-info-row">
          <div class="avatar-wrap">
            ${avatar
              ? `<img class="profile-avatar" src="${avatar}" onerror="this.style.opacity='.3'">`
              : `<div class="profile-avatar"></div>`}
            <div class="online-dot"></div>
          </div>
          <div class="profile-meta">
            <div class="profile-name">${p.name}</div>
            <div class="profile-uid">UID: ${p.uid}</div>
            <div class="profile-stats">
              <div class="pstat">
                <span class="pstat-label">Level</span>
                <span class="pstat-val">${p.level}</span>
              </div>
              <div class="pstat">
                <span class="pstat-label">Likes</span>
                <span class="pstat-val">${p.likes}</span>
              </div>
              <div class="pstat">
                <span class="pstat-label">BR Rank</span>
                <span class="pstat-val">${p.br_rank_point}</span>
              </div>
              <div class="pstat">
                <span class="pstat-label">CS Rank</span>
                <span class="pstat-val">${p.cs_rank_point}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- OUTFIT GRID (semua item langsung) -->
      <div class="section-card">
        <div class="section-title">Outfit Equipped</div>
        <div class="weapon-grid">${outfitGridHTML}</div>
      </div>

      <!-- WEAPONS -->
      ${weaponHTML ? `
      <div class="section-card">
        <div class="section-title">Weapon Showcase</div>
        <div class="weapon-grid">${weaponHTML}</div>
      </div>` : ""}

      <!-- GENERATE CARD -->
      <div class="generate-card">
        <div class="section-title">Generate AI Poster</div>
        <p style="font-size:13px;color:var(--muted);margin-bottom:16px">
          Upload screenshot profil kamu (opsional), lalu klik generate untuk membuat poster sinematik AI.
        </p>

        <div class="upload-area" onclick="document.getElementById('profileUpload').click()">
          <input type="file" id="profileUpload" accept="image/*"
            onchange="
              const f=this.files[0];
              if(!f)return;
              const prev=document.getElementById('uploadPreview');
              prev.src=URL.createObjectURL(f);
              prev.style.display='block';
              document.getElementById('uploadLabelText').textContent='✓ '+f.name;
            ">
          <label class="upload-label" onclick="event.stopPropagation()">
            <span class="upload-icon">📸</span>
            <strong>Upload Screenshot Profil In-Game</strong>
            <span id="uploadLabelText">Opsional — klik atau tap di sini</span>
          </label>
          <img id="uploadPreview" class="upload-preview">
        </div>

        <button class="gen-btn" id="genBtn" onclick="generateCharacter()">
          ✦ Generate AI Poster
        </button>
      </div>

      <!-- AI RESULT -->
      <div id="ai-result"></div>

      <!-- PET -->
      ${pet ? `
      <div class="section-card">
        <div class="section-title">Pet</div>
        <div class="pet-wrap">
          <img class="pet-img" src="${pet}" onclick="inspect('${pet}')" style="cursor:pointer" onerror="this.style.opacity='.3'">
          <div>
            <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:600">Pet Aktif</div>
            <div style="font-size:13px;color:var(--muted);margin-top:4px">Klik gambar untuk memperbesar</div>
          </div>
        </div>
      </div>` : ""}

      <!-- GUILD -->
      <div class="section-card">
        <div class="section-title">Guild</div>
        <div class="guild-row">
          <div class="guild-icon">⚔️</div>
          <div class="guild-info">
            <p>${p.guild_name || "Tidak ada guild"}</p>
            <span>Leader: ${p.guild_leader_name || "-"}</span>
          </div>
        </div>
      </div>

    `;

  }catch(e){
    res.innerHTML = `
      <div class="error-box">
        <div class="err-icon">⚠️</div>
        <p>UID tidak ditemukan atau terjadi kesalahan. Coba cek lagi.</p>
      </div>`;
  }
}

</script>
</body>
</html>
